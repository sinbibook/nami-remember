<html lang="ko">
<head>
    <meta charset="UTF-8">

    <title>춘천 리멤버 펜션</title>

    <!-- Preload critical resources -->
    <link rel="preload" href="styles/common.css" as="style">
    <link rel="preload" href="styles/nearby-attractions.css" as="style">
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/nearby-attractions.css">
    <link rel="stylesheet" href="styles/theme.css">

  <!-- Open Graph Meta Tags for Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="춘천 리멤버 펜션" />
  <meta property="og:description" content="춘천 가족, 복층, 스파, 애견, 온돌, 주차장, 바베큐장, 노래방, 불멍, 공용수영장(실외), 워터슬라이드, 강, 호수, 섬, 수상레저, 수목원, 휴양림, 낚시, 편의점, 매점, 픽업가능, 보드게임, 단체, 커플, 공용개수대, 공용주방시설, 개별바베큐, 테라스" />
  <meta property="og:image" content="https://jlnjajtcnyqupfaqjerz.supabase.co/storage/v1/object/public/app-images/property/33178fe4-d858-463e-be53-95d60143f11f/thumbnail/1781506023035-zcwhrslmzf.jpg" />
  <meta property="og:url" content="https://nami-remember.kr" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="춘천 리멤버 펜션" />
  <meta name="twitter:description" content="춘천 가족, 복층, 스파, 애견, 온돌, 주차장, 바베큐장, 노래방, 불멍, 공용수영장(실외), 워터슬라이드, 강, 호수, 섬, 수상레저, 수목원, 휴양림, 낚시, 편의점, 매점, 픽업가능, 보드게임, 단체, 커플, 공용개수대, 공용주방시설, 개별바베큐, 테라스" />
  <meta name="twitter:image" content="https://jlnjajtcnyqupfaqjerz.supabase.co/storage/v1/object/public/app-images/property/33178fe4-d858-463e-be53-95d60143f11f/thumbnail/1781506023035-zcwhrslmzf.jpg" />
</head>
<body>
    <!-- Include Header -->
    <div id="header-placeholder"></div>

    <!-- Hero Section -->
    <section class="hero-section">
            <div class="hero-background">
                <!-- Custom-field: homepage.customFields.pages.nearbyAttractions.sections[0].hero.images -->
                <img src="" alt="주변관광지 배경" data-nearby-hero-image>
                <div class="hero-overlay"></div>
            </div>
            <div class="hero-content">
                <div class="hero-text-center">
                    <!-- 하드코딩 fixed -->
                    <h1 class="hero-title">주변 관광지</h1>
                </div>
            </div>

            <!-- Scroll Down Indicator -->
            <div class="hero-scroll-down" onclick="scrollToNextSection()">
                <svg class="scroll-arrow" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 14l-7 7m0 0l-7-7m7 7V3"/>
                </svg>
            </div>
    </section>

    <!-- Main Content Section -->
    <main class="attractions-container">
        <div class="attractions-intro-section">
            <div class="attractions-intro-content">
                <div class="attractions-label">
                    <!-- 하드코딩 fixed -->
                    <span class="attractions-number">NEARBY ATTRACTIONS</span>
                </div>
                <!-- Custom-field: homepage.customFields.pages.nearbyAttractions.sections[0].hero.title -->
                <h2 class="attractions-title" data-nearby-attractions-about-title></h2>
                <!-- Custom-field: homepage.customFields.pages.nearbyAttractions.sections[0].hero.description -->
                <p class="attractions-description" data-nearby-attractions-about-description></p>
            </div>
        </div>
        <!-- Custom-field: homepage.customFields.pages.nearbyAttractions.sections[0].about[].images, about[].title, about[].description -->
        <div class="attractions-grid" id="attractions-grid-container">
        </div>
    </main>

    <!-- Closing Section -->
    <section class="attractions-closing">
        <!-- Custom-field: property.images[0].exterior[0] (first exterior image) -->
        <div class="attractions-closing-bg" style="background-size: cover; background-position: center; background-attachment: fixed;" data-nearby-closing-image-bg></div>
        <div class="attractions-closing-overlay">
            <div class="attractions-closing-content">
                <!-- Custom-field: property logo (ImageHelpers.extractLogoUrl) -->
                <img src="" alt="로고" class="closing-logo" data-closing-logo="">
            </div>
        </div>
    </section>

    <!-- Include Footer -->
    <div id="footer-placeholder"></div>

    <!-- Include ImageWithFallback script -->
    <script src="js/image-with-fallback.js"></script>

    <!-- Common Slider Module -->
    <script src="js/common/slider.js"></script>

    <!-- Image Helpers -->
    <script src="js/image-helpers.js"></script>

    <!-- Base Data Mapper -->
    <script src="js/data-mapper/core/base-mapper.js"></script>

    <!-- Header Footer Mapper -->
    <script src="js/data-mapper/pages/header-footer-mapper.js"></script>

    <!-- Nearby Attractions Mapper -->
    <script src="js/data-mapper/pages/nearby-attractions-mapper.js"></script>

    <!-- Preview Handler for Admin Integration -->
    <script src="js/preview-handler.js"></script>

    <!-- Header and Footer Loader -->
    <script src="js/header-footer-loader.js"></script>

    <!-- Page-specific script -->
    <script src="js/pages/nearby-attractions.js"></script>

</body>
</html>
